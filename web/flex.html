    <title>flex 속성 예제</title>
    <style>
        #container{display: flex;}
        .box{width: 100px; height: 100px; background-color: blue; margin: 20px;}

</head>

    <!-- flex 사용 시 부모, 자식 요소 태그 -->
     <div id="container">

        <div class="box"></div>
        <div class="box"></div>
     </div>
</body>
</html>
