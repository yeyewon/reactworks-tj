<body>
    <h1>세계 10대 푸드</h1>
    <h2>마늘(garlic)</h2>
    <p class="p1">일해백리(一害百利)는 마늘의 별명이다. 한 가지 해가 있고 백 가지 이로움이 있다는 뜻이다. <br> 그 한가지 해란, 아린 맛으로 인해 위에 부담을 준다는 것이다.</p>
    <p class="p2">마늘 특유의 아린 맛은 알리신이라는 성분 때문으로 살균 및 향균 작용을 하며 <br> 마늘에 들어 있는 아연이 피로 회복에 도움을 준다.</p>
