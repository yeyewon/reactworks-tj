<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수강신청 폼 만들기</title>
    <link rel="stylesheet" href="../css/major.css">
</head>
<body>
    <div id="wrap">
        <form action="#" method="post">
            <fieldset>
                <legend>수강신청</legend>
                <ul>
                    <li>
                        <label for="cid">학과번호</label>
                        <input type="text" id="cid" name="cid" autofocus required>
                    </li>
                    <li>
                        <label for="name">이름</label>
                        <input type="text" id="name" name="name" value="우영우" readonly>
                    </li>
                    <li>
                        <label for="major">학과</label>
                        <select name="major" id="major" onchange="selectMajor()">
                            <option value="software">소프트웨어학과</option>
                            <option value="mechanic">기계공학과</option>
                            <option value="electric">전기전자공학과</option>
                            <option value="computer">컴퓨터공학과</option>
                        </select>
                    </li>
                </ul>
            </fieldset>
            <div>
                <input type="submit" value="신청하기">
                <input type="reset" value="취소하기">
            </div>
        </form>
    </div>
</body>

<script>
    function selectMajor() {
        const major = document.getElementById("major").value;
        alert(`${major}가 선택되었습니다`)
    }
</script>
</html>
