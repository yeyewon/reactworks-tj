<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex box</title>
    <style>
        .container{
            display: flex; 
            gap: 16px; 
            flex-direction: column; 
            flex-direction: row; 
            /* 주축 정렬 방법 */
            justify-content: flex-start;
            justify-content: space-between;
            justify-content: space-around;
            justify-content: center;
        }
        .box{width: 100px; height: 100px; background-color: lightcoral;}
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
