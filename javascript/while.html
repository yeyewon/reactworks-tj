<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>while 반복문</title>
</head>
<body>
    <script>
        // 1~5까지 출력
        let i = 1;

        while(i <=5){
            console.log(i);
            i++;
        }

        // 짝수만 출력
        let j = 1;
        while(j <= 10){
            if(j % 2 == 0){
                console.log(j);
            }
            j++;
        }
    </script>
</body>
</html>
