<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if문</title>
</head>
<body>
    <h1>짝수/홀수 판별</h1>
    <div id="result"></div>
    <button onclick="calculate()">판별하기</button>
    <script>
        function calculate(){
            const demo = document.getElementById('result');
            let num = parseInt(prompt('숫자를 입력하세요'));
            console.log(typeof(num));
            
            if(num % 2 == 0){
                //console.log('짝수');
                //demo.textContent = `${num}은 짝수입니다.`;
                demo.innerHTML = `<b>${num}</b>은 짝수입니다.`;
                demo.style.color = 'blue';
            }else{
                //console.log('홀수');
                demo.innerHTML = `${num}은 홀수입니다.`
                demo.style.color = 'red';
            }
        }
    </script>
</body>
</html>
