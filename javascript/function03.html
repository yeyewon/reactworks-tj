<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반환값이 있는 함수</title>
</head>
<body>
    <h1>반환값이 있는 함수</h1>
    <div id="result"></div>
    <div id="result2"></div>

    <script>
        let result = document.getElementById('result');
        let result2 = document.getElementById('result2');

        // 화살표 함수
        // 매개변수 하나일 때 () 생략 가능
        let square = x => { return x * x; }
        let num = square(5)
        result.innerHTML = num;

        let add = (x,y) => {
            return x + y;
        }
        let sum = add(10,20);
        result2.innerHTML = `결과: ${sum}`;
    </script>
</body>
</html>
