<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반환값이 있는 함수</title>
</head>
<body>
    <h1>반환값이 있는 함수</h1>
    <div id="result"></div>

    <script>
        let result = document.getElementById('result');
        // 이름없는 함수(익명함수)
        let square = function(x){
            return x * x;
        }
        let add = function(x,y){
            return x + y;
        }
        let num = square(5)
        result.innerHTML = num;

        let sum = add(10,20);
        result.innerHTML = `결과: ${sum}`;
    </script>
</body>
</html>
