<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 포트폴리오</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>My Portfolio</h1>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="#hero">홈</a></li>
                    <li><a href="#projects">프로젝트</a></li>
                    <li><a href="#contact">연락처</a></li>
                </ul>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </nav>
        </div>
    </header>

    <section id="hero">
        <div class="hero-content">
            <h2>안녕하세요, 저는 [이름]입니다.</h2>
            <p>웹 개발자 포트폴리오 사이트입니다.</p>
        </div>
    </section>

    <section id="projects">
        <div class="container">
            <h2>프로젝트</h2>
            <div class="project-grid">
                <div class="project-card">
                    <img src="https://via.placeholder.com/300x200" alt="프로젝트 1">
                    <h3>프로젝트 1</h3>
                    <p>프로젝트 설명입니다.</p>
                    <a href="#" class="btn">자세히 보기</a>
                </div>
                <div class="project-card">
                    <img src="https://via.placeholder.com/300x200" alt="프로젝트 2">
                    <h3>프로젝트 2</h3>
                    <p>프로젝트 설명입니다.</p>
                    <a href="#" class="btn">자세히 보기</a>
                </div>
                <div class="project-card">
                    <img src="https://via.placeholder.com/300x200" alt="프로젝트 3">
                    <h3>프로젝트 3</h3>
                    <p>프로젝트 설명입니다.</p>
                    <a href="#" class="btn">자세히 보기</a>
                </div>
            </div>
        </div>
    </section>

    <section id="contact">
        <div class="container">
            <h2>연락처</h2>
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">메시지</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="btn">보내기</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2023 My Portfolio. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
